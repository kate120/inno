<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Мой сайт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
        }

        p {
            color: #666;
            font-size: 1.2rem;
            margin: 20px 0;
        }

        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🐳 Docker</h1>
        <p>Multi-stage сборка</p>
        <div class="badge">✅ Образ ~20 МБ</div>
        <p class="footer">Собран в контейнере</p>
    </div>
</body>

</html>
